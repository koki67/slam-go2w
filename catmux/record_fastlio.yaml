common:
  default_window: bag_record

parameters:
  source: /external/humble_ws/install/setup.bash
  unitree_ros2: /external/humble_ws/src/unitree_ros2/setup.sh

windows:
  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 run go2w_imu_publisher imu_publisher
    name: imu_publisher

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch hesai_lidar hesai_lidar_launch.py
    name: hesai_lidar_node

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch fast_lio mapping.launch.py config_file:=go2w.yaml pointcloud_topic:=points_raw imu_topic:=go2w/imu
    name: fastlio

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - sleep 5
      - "ros2 bag record -o /external/bags/fastlio_$(date +%Y%m%d_%H%M%S) /Odometry /path /cloud_registered /cloud_registered_body /Laser_map /tf /tf_static"
    name: bag_record
