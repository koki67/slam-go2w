common:
  default_window: bag_record

parameters:
  source: /external/humble_ws/install/setup.bash
  unitree_ros2: /external/humble_ws/src/unitree_ros2/setup.sh

windows:
  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 run go2w_imu_publisher imu_publisher
    name: imu_publisher

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch hesai_lidar hesai_lidar_launch.py
    name: hesai_lidar_node

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch dg_kilo dg_kilo.launch.py
          config_path:=/external/config/dgkilo
          config_file:=go2w.yaml
          rviz:=false
    name: dgkilo

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - sleep 5
      - "ros2 bag record -o /external/bags/dgkilo_$(date +%Y%m%d_%H%M%S)
          /dg_kilo/odom
          /dg_kilo/leg_odom
          /dg_kilo/path
          /dg_kilo/map
          /dg_kilo/degradation
          /tf
          /tf_static"
    name: bag_record
