common:
  default_window: wheel_legged_odometry

parameters:
  source: /external/humble_ws/install/setup.bash
  unitree_ros2: /external/humble_ws/src/unitree_ros2/setup.sh

windows:
  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 run go2w_imu_publisher imu_publisher
    name: imu_publisher

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch hesai_lidar hesai_lidar_launch.py
    name: hesai_lidar_node

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch wheel_legged_odometry wheel_legged_odometry.launch.py
          config_path:=/external/config/wheel_legged_odometry
          config_file:=go2w.yaml
          lowstate_topic:=lowstate
          rviz:=false
    name: wheel_legged_odometry

  # Desktop-side RViz is launched separately:
  #   bash scripts/wheel_legged_odometry/live_rviz.sh --iface <wifi_iface>
