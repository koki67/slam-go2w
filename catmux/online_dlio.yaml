common:
  default_window: dlio

parameters:
  source: /external/humble_ws/install/setup.bash
  unitree_ros2: /external/humble_ws/src/unitree_ros2/setup.sh
  rviz_cfg: direct_lidar_inertial_odometry/launch/dlio.rviz

windows:
  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 run go2w_imu_publisher imu_publisher
    name: imu_publisher

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch hesai_lidar hesai_lidar_launch.py
    name: hesai_lidar_node

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch direct_lidar_inertial_odometry dlio.launch.py
    name: dlio

  # - commands:
  #     - source ${source}
  #     - source ${unitree_ros2}
  #     - rviz2 -d ${rviz_cfg}
  #   name: rviz2
