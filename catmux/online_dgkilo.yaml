common:
  default_window: dgkilo

parameters:
  source: /external/humble_ws/install/setup.bash
  unitree_ros2: /external/humble_ws/src/unitree_ros2/setup.sh
  rviz_cfg: /external/config/dgkilo/dg_kilo.rviz

windows:
  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 run go2w_imu_publisher imu_publisher
    name: imu_publisher

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch hesai_lidar hesai_lidar_launch.py
    name: hesai_lidar_node

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch dg_kilo dg_kilo.launch.py
          config_path:=/external/config/dgkilo
          config_file:=go2w.yaml
          pointcloud_topic:=/points_raw
          imu_topic:=/go2w/imu
          lowstate_topic:=lowstate
          rviz:=false
    name: dgkilo

  # Desktop-side RViz is launched separately via scripts/dgkilo/live_rviz.sh
  # - commands:
  #     - source ${source}
  #     - rviz2 -d ${rviz_cfg}
  #   name: rviz2
