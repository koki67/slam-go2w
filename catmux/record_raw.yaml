common:
  default_window: bag_record

parameters:
  source: /external/humble_ws/install/setup.bash
  unitree_ros2: /external/humble_ws/src/unitree_ros2/setup.sh

windows:
  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 run go2_demo imu_publisher
    name: imu_publisher

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch hesai_lidar hesai_lidar_launch.py
    name: hesai_lidar_node

  # Raw sensor recording for offline processing (D-LIO, GLIM, etc.)
  # Topics: /go2w/imu + /points_raw
  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - sleep 5
      - "ros2 bag record -o /external/bags/raw_$(date +%Y%m%d_%H%M%S) /go2w/imu /points_raw"
    name: bag_record
