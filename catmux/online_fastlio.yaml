common:
  default_window: fastlio

parameters:
  source: /external/humble_ws/install/setup.bash
  unitree_ros2: /external/humble_ws/src/unitree_ros2/setup.sh
  rviz_cfg: /external/config/fastlio/fastlio.rviz

windows:
  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 run go2w_imu_publisher imu_publisher
    name: imu_publisher

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch hesai_lidar hesai_lidar_launch.py
    name: hesai_lidar_node

  - commands:
      - source ${source}
      - source ${unitree_ros2}
      - ros2 launch fast_lio mapping.launch.py config_file:=go2w.yaml pointcloud_topic:=points_raw imu_topic:=go2w/imu
    name: fastlio

  - commands:
      - source ${source}
      - ros2 run tf2_ros static_transform_publisher 0 0 0 -1.5707963 0 0 body base_link
    name: tf_body_baselink

  # - commands:
  #     - source ${source}
  #     - source ${unitree_ros2}
  #     - rviz2 -d ${rviz_cfg}
  #   name: rviz2
